name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync
      - name: Lint
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync
      - name: Create databases
        run: mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE digi_fhir; CREATE DATABASE digi_fhir_test;"
      - name: Write config.yaml
        run: |
          cat > config.yaml <<'YAML'
          gateways:
            mysql:
              connection: {type: mysql, host: 127.0.0.1, port: 3306, user: root, password: root, database: digi_fhir}
              test_connection: {type: mysql, host: 127.0.0.1, port: 3306, user: root, password: root, database: digi_fhir_test}
          default_gateway: mysql
          model_defaults: {dialect: mysql}
          variables: {national_id_system: 'http://isanteplus.org/openmrs/fhir2/6-biometrics-national-reference-code'}
          disable_anonymized_analytics: true
          YAML
      - name: SQLMesh model tests
        run: uv run sqlmesh test
      - name: Loader unit tests
        run: uv run pytest -q
      - name: Shell script syntax
        run: bash -n loader/run_continuous.sh
